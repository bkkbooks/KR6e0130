body:
  text: 唐清涼國師澄觀撰圭峰沙門宗密注至道本乎其心諸佛衆生迷悟本也心法本乎無住萬法之宗本乎無住即心體也淨名經云依無住本立一切法無住心體靈知不昧瑩淨之理性相寂默性即空空絶跡相即星象粲然包含德用性包含於神用具塵沙之無邊該攝內外相該攝於內外亦不在於中間能廣無外也能深無內也非有非空妙有不空真空不有不生不滅非四相所遷也求之不得棄之不離明一真心地絶取捨之情迷現量則惑苦紛然迷本逐末悟真性則空明廓徹返本還源雖即心即佛唯證者方知凡聖一真猶來見隔見在即凡情忘即佛智與理冥境與神會者方知也然有證有知則慧日沈沒於有地若存證知則棄內而外求即滯於有若無照無悟則昏雲掩蔽於空門若忘智忘照則外忘緣而內忘照即滯於無但一念不生前後際斷妄心不生二際俱斷照體獨立物我皆如真智現前我及我所悉皆同體直造心源無智無得至理虗玄言忘慮絶不可以識識不可以行得不取不捨性自天真本無取捨無對無修本非對待豈有修作然迷悟更依真妄相待迷即六凡悟則四聖真智生妄念滅妄若起真智隱若求真去妄如避影以勞形若有取捨勞形役智若體妄即真似處陰而影滅妄無自性舉體即真若無心忘照則萬纍都捐既忘心照煩惱自空若任運寂知則衆行圓起起即體之用用而無用何假因耶放曠任其去住不著彼此靜鑑見其源流動靜不失理也語默不失玄微語默全真動靜豈離法界去住合道言止則雙忘智寂止觀俱泯論觀則雙照寂知止觀齊彰語證不可示人寂然之理不可說示說理非證不了唯證相應悟寂無寂智與理冥真智無知真如之理泯能知智以知寂不二之一心以即理之智也契空有雙融之中道證不二之理也無住無著二邊不立中道不安莫攝莫收任法界性延促無礙是非兩忘能所雙絶斯絶亦絶般若現前法界真性思慮叵窮若絶能所則真智現前也般若非心外新生不從外得智性乃本來具足非新新有然本寂不能自見實由般若之功理非智不能顯般若之與智性翻覆相成智非理不能生本智之與始終兩體雙絶本末俱泯證入則妙覺圓明體無瑕翳悟本則因果交徹凡聖相入心心作佛無一心而非佛心念念全真處處證真無一塵而非佛國即染而淨真妄物我舉一全收二而不二心佛衆生炳然齊致不二而二迷則人隨於法法法萬差而人不同迷真逐妄悟則法隨於人人人一致而融萬境物象無體言窮慮絶何果何因本離言念體本寂寥孰同孰異非同異境唯志懷虗朗消息沖融佩道之士契之即神其猶透水月華虗而可見喻也無心鏡像照而常空矣虛心之鑑心要法門頌欲達心源淨所迷之理須知我相空萬物自虗形容何處實緣生本無念慮本無從起處不真豁爾靈明現似日初出翛然世界通即無障礙真金開伏藏情忘理現赫日出瞑智起惑忘試將心比佛性無異故與佛始終同真妄無別
